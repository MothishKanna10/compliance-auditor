services:
  ingestion:
    build: .
    command: python -m app.ingestion
    env_file: .env
    volumes:
      - chroma_data:/app/chroma_db

  backend:
    build: .
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      ingestion:
        condition: service_completed_successfully

  frontend:
    build: .
    command: streamlit run ui.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  chroma_data:
